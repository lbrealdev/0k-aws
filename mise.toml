[tools]
steampipe = "latest"

[tasks.mise-tools]
description = "List mise tools installed in current directory"
alias = "t"
quiet = true
run = '''
mise ls --json | \
    jq -r --arg pwd "$(pwd)" 'to_entries[] | select(.value[].source.path != null and (.value[].source.path | contains($pwd))) | .key'
'''
